{{define "error.html"}}
<div class="text-center py-12">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/30 mb-6">
        <svg class="h-8 w-8 text-red-600 dark:text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>
    
    <h2 class="text-xl font-semibold text-text dark:text-white mb-2">Something went wrong</h2>
    <p class="text-text-muted dark:text-gray-400 mb-6 max-w-md mx-auto">{{.Error}}</p>
    
    <button
        hx-get="/"
        hx-target="#main-content"
        hx-push-url="/"
        class="inline-flex items-center px-4 py-2 rounded-lg bg-accent hover:bg-accent-hover text-white font-medium transition-colors"
    >
        <svg class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Try Again
    </button>
</div>
{{end}}
